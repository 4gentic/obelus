name: release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Release tag to build for (e.g. desktop-v0.1.2)"

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
      id: ${{ steps.pick.outputs.id }}
      should-build: ${{ steps.pick.outputs.should-build }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$EVENT_TAG}"
          if [[ "$TAG" != desktop-v* ]]; then
            echo "Skipping: tag '$TAG' is not a desktop release."
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq .id)
          {
            echo "tag=$TAG"
            echo "id=$ID"
            echo "should-build=true"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    if: needs.resolve.outputs.should-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter=!@obelus/desktop -r build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.resolve.outputs.id }}
          args: ${{ matrix.args }}

  publish-update-channel:
    needs: [resolve, build]
    if: needs.resolve.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --latest -R "$REPO"

          WORK="$(mktemp -d)"
          gh release download "$TAG" -R "$REPO" -p latest.json -D "$WORK"

          # Delete-and-recreate (instead of `gh release upload --clobber`) so
          # each release publishes a brand-new asset under desktop-latest.
          # GitHub Releases CDN edges can serve stale content for a clobbered
          # asset for an unpredictable window — installed clients then read
          # the previous version's manifest and conclude "up to date" against
          # an outdated build. Recreating the release sidesteps that.
          if gh release view desktop-latest -R "$REPO" >/dev/null 2>&1; then
            gh release delete desktop-latest -R "$REPO" --cleanup-tag --yes
          fi
          gh release create desktop-latest -R "$REPO" \
            --title "Desktop update channel" \
            --notes "Rolling pointer to the latest desktop release. Used by the in-app updater. See the desktop-v* releases for actual binaries and changelogs." \
            --latest=false \
            "$WORK/latest.json"

  bump-homebrew-tap:
    needs: [resolve, build, publish-update-channel]
    if: needs.resolve.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: download dmg artifacts and compute sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#desktop-v}"
          WORK="$(mktemp -d)"
          gh release download "$TAG" -R "$REPO" \
            -p "Obelus_${VERSION}_aarch64.dmg" \
            -p "Obelus_${VERSION}_x64.dmg" \
            -D "$WORK"
          SHA_ARM=$(shasum -a 256 "$WORK/Obelus_${VERSION}_aarch64.dmg" | awk '{print $1}')
          SHA_X64=$(shasum -a 256 "$WORK/Obelus_${VERSION}_x64.dmg"     | awk '{print $1}')
          {
            echo "VERSION=$VERSION"
            echo "SHA_ARM=$SHA_ARM"
            echo "SHA_X64=$SHA_X64"
          } >> "$GITHUB_ENV"

      - name: render cask
        run: |
          set -euo pipefail
          mkdir -p out
          sed \
            -e "s|{{VERSION}}|${VERSION}|g" \
            -e "s|{{SHA_ARM64}}|${SHA_ARM}|g" \
            -e "s|{{SHA_X86_64}}|${SHA_X64}|g" \
            homebrew/obelus.rb.tmpl > out/obelus.rb

      - name: push to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping cask publish."
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/4gentic/homebrew-obelus.git" tap
          mkdir -p tap/Casks
          cp out/obelus.rb tap/Casks/obelus.rb
          cd tap
          git config user.name  "obelus-release-bot"
          git config user.email "noreply@4gentic.ai"
          if git diff --quiet; then
            echo "Cask already at obelus ${VERSION}; nothing to push."
            exit 0
          fi
          git add Casks/obelus.rb
          git commit -m "obelus ${VERSION}"
          git push origin main
