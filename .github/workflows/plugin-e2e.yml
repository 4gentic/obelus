# Plugin end-to-end regression check.
#
# Runs four real Claude Code sessions against packages/claude-plugin/ and asserts
# that write-review and apply-revision behave as documented — so regressions from
# Claude Code updates, model drift, or schema-shipping bugs surface on their own
# instead of waiting for a user to hit them.
#
# Requires ANTHROPIC_API_KEY in repo Actions secrets. The harness uses --bare
# mode, which reads auth only from env (never the keychain).
name: plugin-e2e

on:
  schedule:
    # Mondays 07:00 UTC — early enough to catch a fresh weekly Claude Code release,
    # late enough that overnight infra noise has settled.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Run plugin E2E suite
        id: e2e
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OBELUS_E2E_TMP_DIR: ${{ github.workspace }}/.tmp/plugin-e2e
        run: pnpm plugin:e2e

      - name: Upload preserved temp dirs on failure
        if: failure() && steps.e2e.conclusion == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: plugin-e2e-tmp
          path: ${{ github.workspace }}/.tmp/plugin-e2e/
          if-no-files-found: ignore
          retention-days: 14

      - name: Open or update rolling failure issue
        if: failure() && steps.e2e.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_SHA: ${{ github.sha }}
          RUN_REF: ${{ github.ref_name }}
          RUN_EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="[plugin-e2e] regression detected"
          body=$(cat <<EOF
          The plugin E2E suite failed on \`${RUN_SHA}\` (${RUN_REF}).

          - Workflow run: ${RUN_URL}
          - Triggered by: ${RUN_EVENT}
          - Date: $(date -u +'%Y-%m-%d %H:%M UTC')

          The preserved \`.tmp/plugin-e2e/\` is attached to the run as an artifact. Each failing scenario's dir holds the staged fixtures and any plan files the plugin wrote; the run log has the per-scenario stdout/stderr tails.

          This issue is reused across runs — a new comment is appended each time the suite fails. Close it when the regression is fixed.
          EOF
          )
          existing=$(gh issue list \
            --repo "$GH_REPO" \
            --search "$title in:title is:open" \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GH_REPO" --body "$body"
          else
            gh issue create --repo "$GH_REPO" --title "$title" --body "$body" --label "bug"
          fi
