name: dependabot-lockfile

on:
  pull_request:
    branches: [main]

# Write access so the bot can push the updated lockfile back to the PR branch.
permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    # Route github.head_ref through an env var so it is never interpolated
    # directly into a shell script (follows Actions injection-safety guidance).
    env:
      HEAD_REF: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_REF }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Regenerate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --staged --quiet || (git commit -m "chore: regenerate pnpm-lock.yaml" && git push)
