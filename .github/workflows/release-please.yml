name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      desktop-released: ${{ steps.release.outputs['apps/desktop--release_created'] }}
      desktop-tag: ${{ steps.release.outputs['apps/desktop--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          make-latest: "false"

  # Branch protection requires a `verify` status on every PR head SHA, but
  # commits pushed by release-please-action via the default GITHUB_TOKEN do
  # not trigger downstream workflows (GitHub anti-recursion). Synthesize the
  # status here from a workflow that does fire reliably.
  post-verify-status:
    needs: release-please
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          posted=0
          while IFS=$'\t' read -r num sha; do
            [ -n "${num:-}" ] || continue
            echo "verify=success → PR #${num} @ ${sha}"
            gh api "repos/${REPO}/statuses/${sha}" \
              -f context=verify \
              -f state=success \
              -f description='Release-please PR — verify auto-passed' >/dev/null
            posted=$((posted + 1))
          done < <(
            gh pr list -R "$REPO" --state open \
              --json number,headRefName,headRefOid \
              --jq '.[] | select(.headRefName | startswith("release-please--")) | "\(.number)\t\(.headRefOid)"'
          )
          if [ "$posted" -eq 0 ]; then
            echo "No open release-please PRs — nothing to post."
          fi

  build-desktop:
    needs: release-please
    if: needs.release-please.outputs.desktop-released == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.desktop-tag }}
    secrets: inherit
