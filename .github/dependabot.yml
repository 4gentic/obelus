version: 2
updates:
  # Single entry covers every workspace — shared deps (zod, react, zustand, etc.)
  # land in one grouped PR instead of one per directory.
  - package-ecosystem: npm
    directories:
      - /
      - /apps/web
      - /apps/desktop
      - /packages/anchor
      - /packages/bundle-builder
      - /packages/bundle-schema
      - /packages/categories
      - /packages/claude-plugin
      - /packages/claude-plugin-drafter
      - /packages/claude-sidecar
      - /packages/design-tokens
      - /packages/drafter-core
      - /packages/html-view
      - /packages/md-view
      - /packages/pdf-view
      - /packages/prompts
      - /packages/repo
      - /packages/review-shell
      - /packages/review-store
      - /packages/source-render
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      all-npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(cargo)"
      include: "scope"
    groups:
      desktop-cargo:
        patterns: ["*"]
